services:
  # ----------------------------------------------------------------
  # BACKEND - Express + MongoDB auth server
  # Folder: backend/
  # (youtube/ and telegram/ are deployed on Streamlit Community Cloud,
  #  not Render -- see streamlit deploy steps separately)
  # ----------------------------------------------------------------
  - type: web
    name: leadstack-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard -- MUST match the JWT_SECRET set in each Streamlit app's secrets
      - key: FRONTEND_URL
        sync: false          # Your Netlify site URL, e.g. https://leadstack.netlify.app